{% extends "base.html" %}
{% block content %}

<div class="ticket">
    <h2>List something to trade</h2>
    <form method="POST" action="{{ url_for('create_post_form') }}">
        <label>Title
            <input type="text" name="title" required>
        </label>
        <label>Description
            <input type="text" name="description" required>
        </label>
        <button type="submit">Pin to the board</button>
    </form>
</div>

<h2 style="font-family:'Special Elite',cursive;">The Board</h2>

{% for post in posts %}
<div class="ticket">
    <span class="stamp {{ post.status|lower }}">{{ post.status }}</span>
    <h2><a class="ticket-link" href="{{ url_for('view_post', post_id=post.post_id) }}">{{ post.title }}</a></h2>
    <p>{{ post.description }}</p>
    <p class="meta">Listed by trader #{{ post.owner_id }} &middot; Ticket #{{ post.post_id }}</p>
</div>
{% endfor %}

{% endblock %}
